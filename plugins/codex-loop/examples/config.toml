[features]
codex_hooks = true

# For a project-local install, place hooks.json at <repo>/.codex/hooks.json.
# Marketplace installs autostart codex-loopd from the MCP create tool.
#
# To manage codex-loopd manually instead:
#
#   plugins/codex-loop/scripts/codex-loopd --runner exec
#
# The app-server runner is closer to interactive /loop semantics:
#
#   codex app-server --listen ws://127.0.0.1:4500 --ws-auth capability-token --ws-token-file ~/.codex-loop/ws-token
#   export CODEX_WS_TOKEN="$(cat ~/.codex-loop/ws-token)"
#   export CODEX_LOOP_APP_SERVER_TOKEN_FILE=~/.codex-loop/ws-token
#   export CODEX_LOOP_DB=~/.codex-loop/runtimes/127-0-0-1-4500/loop.sqlite3
#   codex --remote ws://127.0.0.1:4500 --remote-auth-token-env CODEX_WS_TOKEN
#   plugins/codex-loop/scripts/codex-loopd --runner app-server --app-server ws://127.0.0.1:4500 --app-server-token-file "$CODEX_LOOP_APP_SERVER_TOKEN_FILE" --db "$CODEX_LOOP_DB"
